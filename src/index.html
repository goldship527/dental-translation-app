<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>歯科翻訳アプリ</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-labelledby="app-title">
        <div class="topbar">
          <div>
            <p class="eyebrow">Dental Translation Prototype</p>
            <h1 id="app-title">歯科翻訳アプリ</h1>
          </div>
          <span class="status-pill">Demo</span>
        </div>

        <div class="notice" role="note">
          患者名、住所、電話番号、カルテ内容などの個人情報は入力しないでください。
        </div>

        <div class="grid">
          <section class="panel" aria-labelledby="input-title">
            <div class="panel-header">
              <h2 id="input-title">入力</h2>
              <button class="icon-button" id="clearButton" type="button" aria-label="入力を消去">×</button>
            </div>

            <label for="scene">場面</label>
            <select id="scene">
              <option value="reception">受付</option>
              <option value="medicalInterview">問診</option>
              <option value="treatment">治療説明</option>
              <option value="payment">会計</option>
              <option value="aftercare">術後説明</option>
            </select>

            <label for="targetLanguage">翻訳先</label>
            <select id="targetLanguage">
              <option value="en">英語</option>
              <option value="zh">中国語</option>
              <option value="ko">韓国語</option>
            </select>

            <label for="sourceText">日本語</label>
            <textarea id="sourceText" rows="7">今日はどのような症状で来院されましたか？</textarea>

            <button class="primary-button" id="translateButton" type="button">翻訳する</button>
          </section>

          <section class="panel result-panel" aria-labelledby="result-title">
            <div class="panel-header">
              <h2 id="result-title">翻訳結果</h2>
              <span id="resultMeta">英語 / 受付</span>
            </div>
            <output id="resultText" class="result-text">
              What symptoms brought you to the clinic today?
            </output>
            <p class="result-note">
              現在は画面確認用のデモ翻訳です。実翻訳API連携は次フェーズで検討します。
            </p>
          </section>
        </div>

        <section class="phrase-section" aria-labelledby="phrases-title">
          <div class="section-header">
            <h2 id="phrases-title">よく使うフレーズ</h2>
            <p>選ぶと入力欄に入ります。</p>
          </div>
          <div class="phrase-list" id="phraseList"></div>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
